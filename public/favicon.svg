<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Round rect base with dark futuristic carbon color -->
  <rect width="100" height="100" rx="26" fill="#0f1112" />
  
  <!-- Glowing subtle border/outline in brand orange -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="none" stroke="#e27500" stroke-width="3" stroke-opacity="0.4" />
  
  <!-- Minimalist code brackets and letter R -->
  <path d="M 26 35 L 12 50 L 26 65" fill="none" stroke="#e27500" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 74 35 L 88 50 L 74 65" fill="none" stroke="#e27500" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Letter R in Outfit/heading font style -->
  <text x="50" y="64" font-family="'Outfit', 'Inter', sans-serif" font-size="44" font-weight="900" fill="#eaeaea" text-anchor="middle">R</text>
</svg>
